<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d1117"/>
  <text x="400" y="42" fill="#ff3258" font-family="monospace" font-size="17" text-anchor="middle" letter-spacing="1">ANN vs SVM — Binary Classification</text>
  <line x1="400" y1="60" x2="400" y2="470" stroke="#222" stroke-width="1"/>

  <!-- ANN label -->
  <text x="200" y="82" fill="#e5e5e6da" font-family="monospace" font-size="13" text-anchor="middle">Artificial Neural Network</text>

  <!-- Input nodes -->
  <circle cx="75"  cy="180" r="18" fill="#0d1117" stroke="#ff3258" stroke-width="2"/>
  <circle cx="75"  cy="250" r="18" fill="#0d1117" stroke="#ff3258" stroke-width="2"/>
  <circle cx="75"  cy="320" r="18" fill="#0d1117" stroke="#ff3258" stroke-width="2"/>

  <!-- Hidden nodes -->
  <circle cx="210" cy="155" r="18" fill="#0d1117" stroke="#0077cc" stroke-width="2"/>
  <circle cx="210" cy="220" r="18" fill="#0d1117" stroke="#0077cc" stroke-width="2"/>
  <circle cx="210" cy="285" r="18" fill="#0d1117" stroke="#0077cc" stroke-width="2"/>
  <circle cx="210" cy="350" r="18" fill="#0d1117" stroke="#0077cc" stroke-width="2"/>

  <!-- Output node -->
  <circle cx="340" cy="252" r="18" fill="#0d1117" stroke="#00a3ff" stroke-width="2"/>

  <!-- Input → Hidden connections -->
  <line x1="93"  y1="180" x2="192" y2="155" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="180" x2="192" y2="220" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="180" x2="192" y2="285" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="180" x2="192" y2="350" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="250" x2="192" y2="155" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="250" x2="192" y2="220" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="250" x2="192" y2="285" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="250" x2="192" y2="350" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="320" x2="192" y2="155" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="320" x2="192" y2="220" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="320" x2="192" y2="285" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="93"  y1="320" x2="192" y2="350" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Hidden → Output -->
  <line x1="228" y1="155" x2="322" y2="252" stroke="#ff3258" stroke-width="1.5" opacity="0.7"/>
  <line x1="228" y1="220" x2="322" y2="252" stroke="#ff3258" stroke-width="1.5" opacity="0.7"/>
  <line x1="228" y1="285" x2="322" y2="252" stroke="#ff3258" stroke-width="1.5" opacity="0.7"/>
  <line x1="228" y1="350" x2="322" y2="252" stroke="#ff3258" stroke-width="1.5" opacity="0.7"/>

  <!-- Layer labels -->
  <text x="75"  y="415" fill="#555" font-family="monospace" font-size="11" text-anchor="middle">Input</text>
  <text x="210" y="415" fill="#555" font-family="monospace" font-size="11" text-anchor="middle">Hidden</text>
  <text x="340" y="295" fill="#555" font-family="monospace" font-size="11" text-anchor="middle">Out</text>

  <!-- SVM label -->
  <text x="600" y="82" fill="#e5e5e6da" font-family="monospace" font-size="13" text-anchor="middle">Support Vector Machine</text>

  <!-- Margin lines -->
  <line x1="565" y1="100" x2="565" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="635" y1="100" x2="635" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="5,4"/>
  <!-- Decision boundary -->
  <line x1="600" y1="100" x2="600" y2="460" stroke="#ff3258" stroke-width="2"/>

  <!-- Class 0 (blue) -->
  <circle cx="490" cy="175" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="510" cy="235" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="480" cy="305" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="522" cy="375" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="500" cy="430" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="468" cy="260" r="9" fill="#0077cc" opacity="0.85"/>
  <!-- Support vectors left -->
  <circle cx="548" cy="195" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="548" cy="195" r="16" fill="none" stroke="#0077cc" stroke-width="1.5"/>
  <circle cx="544" cy="345" r="9" fill="#0077cc" opacity="0.85"/>
  <circle cx="544" cy="345" r="16" fill="none" stroke="#0077cc" stroke-width="1.5"/>

  <!-- Class 1 (pink) -->
  <circle cx="712" cy="188" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="692" cy="258" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="722" cy="338" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="703" cy="412" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="733" cy="228" r="9" fill="#ff3258" opacity="0.85"/>
  <!-- Support vectors right -->
  <circle cx="655" cy="218" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="655" cy="218" r="16" fill="none" stroke="#ff3258" stroke-width="1.5"/>
  <circle cx="658" cy="378" r="9" fill="#ff3258" opacity="0.85"/>
  <circle cx="658" cy="378" r="16" fill="none" stroke="#ff3258" stroke-width="1.5"/>

  <text x="600" y="478" fill="#ff3258" font-family="monospace" font-size="11" text-anchor="middle">decision boundary</text>
  <text x="400" y="496" fill="#444" font-family="monospace" font-size="10" text-anchor="middle">Performance Metrics Compared Across Both Models</text>
</svg>
