<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d1117"/>
  <text x="400" y="38" fill="#ff3258" font-family="monospace" font-size="17" text-anchor="middle" letter-spacing="1">A* Pathfinding Algorithm</text>

  <!-- Grid -->
  <g stroke="#1a2744" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="80"  y1="65" x2="80"  y2="455"/>
    <line x1="140" y1="65" x2="140" y2="455"/>
    <line x1="200" y1="65" x2="200" y2="455"/>
    <line x1="260" y1="65" x2="260" y2="455"/>
    <line x1="320" y1="65" x2="320" y2="455"/>
    <line x1="380" y1="65" x2="380" y2="455"/>
    <line x1="440" y1="65" x2="440" y2="455"/>
    <line x1="500" y1="65" x2="500" y2="455"/>
    <line x1="560" y1="65" x2="560" y2="455"/>
    <line x1="620" y1="65" x2="620" y2="455"/>
    <line x1="680" y1="65" x2="680" y2="455"/>
    <line x1="720" y1="65" x2="720" y2="455"/>
    <!-- Horizontal lines -->
    <line x1="80" y1="65"  x2="720" y2="65"/>
    <line x1="80" y1="125" x2="720" y2="125"/>
    <line x1="80" y1="185" x2="720" y2="185"/>
    <line x1="80" y1="245" x2="720" y2="245"/>
    <line x1="80" y1="305" x2="720" y2="305"/>
    <line x1="80" y1="365" x2="720" y2="365"/>
    <line x1="80" y1="425" x2="720" y2="425"/>
    <line x1="80" y1="455" x2="720" y2="455"/>
  </g>

  <!-- Walls -->
  <rect x="200" y="125" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="200" y="185" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="200" y="245" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="380" y="185" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="380" y="245" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="380" y="305" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="500" y="65"  width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="560" y="245" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>
  <rect x="560" y="305" width="60" height="60" fill="#1e3a5f" opacity="0.9"/>

  <!-- Explored cells (visited) -->
  <rect x="140" y="65"  width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="200" y="65"  width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="65"  width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="125" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="185" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="245" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="305" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="260" y="365" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="320" y="305" width="60" height="60" fill="#0077cc" opacity="0.15"/>
  <rect x="320" y="365" width="60" height="60" fill="#0077cc" opacity="0.15"/>

  <!-- Optimal path highlight -->
  <rect x="80"  y="65"  width="60" height="60" fill="#ff3258" opacity="0.25"/>
  <rect x="140" y="65"  width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="65"  width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="125" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="185" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="245" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="305" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="260" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="320" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="380" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="440" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="440" y="305" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="440" y="245" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="440" y="185" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="440" y="125" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="500" y="125" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="560" y="125" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="620" y="125" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="620" y="185" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="620" y="245" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="620" y="305" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="620" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>
  <rect x="660" y="365" width="60" height="60" fill="#ff3258" opacity="0.35"/>

  <!-- Start node -->
  <rect x="80" y="65" width="60" height="60" fill="#ff3258" opacity="0.7" rx="4"/>
  <text x="110" y="100" fill="white" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">S</text>

  <!-- End node -->
  <rect x="660" y="365" width="60" height="60" fill="#00a3ff" opacity="0.8" rx="4"/>
  <text x="690" y="400" fill="white" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">G</text>

  <!-- Legend -->
  <rect x="80"  y="468" width="14" height="14" fill="#ff3258" opacity="0.7"/>
  <text x="100" y="480" fill="#888" font-family="monospace" font-size="11">Optimal path</text>
  <rect x="240" y="468" width="14" height="14" fill="#0077cc" opacity="0.4"/>
  <text x="260" y="480" fill="#888" font-family="monospace" font-size="11">Explored</text>
  <rect x="380" y="468" width="14" height="14" fill="#1e3a5f"/>
  <text x="400" y="480" fill="#888" font-family="monospace" font-size="11">Wall</text>
  <text x="600" y="480" fill="#444" font-family="monospace" font-size="10">f(n) = g(n) + h(n)</text>
</svg>
